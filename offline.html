<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Tikplayer - Offline</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .card { max-width: 420px; padding: 20px; border: 1px solid #2a2a2a; border-radius: 12px; background: #121212; }
    h1 { margin: 0 0 10px; font-size: 20px; }
    p { margin: 8px 0; color: #ccc; line-height: 1.5; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tikplayer 已离线</h1>
    <p>应用壳层可打开，但媒体播放、转码和下载依赖网络连接。</p>
    <p>请恢复网络后重试。</p>
  </div>
</body>
</html>
