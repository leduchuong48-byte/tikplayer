services:
  tikplayer:
    image: tikplayer:2.0.0
    container_name: tikplayer_v2
    restart: unless-stopped
    ports:
      - "1015:8000"
    env_file:
      - .env
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "44"
      - "109"
    environment:
      - LIBVA_DRIVER_NAME=iHD
    volumes:
      - ./image:/app/image
      - ./data:/app/data
    shm_size: "2gb"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
