<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content">
    <title>Tikplayer 2.3</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">

    <script src="/static/hls.min.js"></script>
    <script src="/static/artplayer.js"></script>
    
    <style>
        :root { --primary: #fe2c55; --bg: #000; --card-bg: #1a1a1a; --text: #fff; --nav-height: 50px; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; user-select: none; }
        .icon { display:inline-block; width:1em; height:1em; vertical-align:-0.125em; fill:currentColor; }
        .icon-spin { animation:spin 0.8s linear infinite; }
        body { background: var(--bg); min-height: 100vh; min-height: 100svh; min-height: 100dvh; width: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text); display: flex; flex-direction: column; }
        
        #app-container { flex: 1; position: relative; overflow: hidden; z-index: 1; height: 100dvh; }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom)); }
        .page.active { display: flex; z-index: 10; }
        #page-play { background: #000; overflow: hidden; padding-bottom: 0; }
        
        #player { width: 100%; height: 100%; background: #000; }
        #player.landscape-mode .art-video { object-fit: cover !important; }
        .art-video { object-fit: contain; }
        #image-viewer { width: 100%; height: 100%; display: none; background-size: contain; background-position: center; background-repeat: no-repeat; }
        .art-controls { display: flex !important; }
        #click-layer { position: absolute; top:0; left:0; width:100%; height:100%; z-index:15; }

        .right-controls { position: absolute; right: 6px; bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 25px); z-index: 20; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .control-item { display: flex; flex-direction: column; align-items: center; opacity: 0.9; transition: opacity 0.1s; }
        .control-item:active { opacity: 0.6; transform: scale(0.95); }
        .control-item:focus-visible, .nav-item:focus-visible, .action-item:focus-visible, [role="button"]:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            border-radius: 6px;
        }
        .control-icon { font-size: 22px; margin-bottom: 2px; width: 38px; height: 38px; display:flex; align-items:center; justify-content:center; text-shadow: 0 1px 3px rgba(0,0,0,0.8); filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
        .control-text { font-size: 10px; font-weight: 500; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

        .progress-container { position: fixed; bottom: calc(var(--nav-height) + env(safe-area-inset-bottom)); left: 0; width: 100%; height: 20px; z-index: 1200; display: flex; align-items: flex-end; cursor: pointer; touch-action: none; }
        .progress-bg { width: 100%; height: 1px; background: rgba(255,255,255,0.25); position: relative; transition: height 0.2s ease; }
        .progress-current { height: 100%; width: 0; background: #fff; position: absolute; top: 0; left: 0; }
        .progress-thumb { width: 8px; height: 8px; background: #fff; border-radius: 50%; position: absolute; right: -4px; top: 50%; transform: translateY(-50%) scale(0); transition: transform 0.2s; box-shadow: 0 0 4px rgba(0,0,0,0.5); }
        .progress-container:active .progress-bg { height: 4px; background: rgba(255,255,255,0.35); }
        .progress-container:active .progress-thumb { transform: translateY(-50%) scale(1.5); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(var(--nav-height) + env(safe-area-inset-bottom)); padding-bottom: env(safe-area-inset-bottom); background: linear-gradient(to top, rgba(0,0,0,1), rgba(0,0,0,0.8)); display: flex; align-items: center; justify-content: space-around; z-index: 1000; backdrop-filter: blur(5px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; flex: 1; height: 100%; gap: 3px; }
        .nav-item span { font-size: 9px; }
        .nav-item i { font-size: 18px; margin-bottom: 2px; }
        .nav-item.active { color: #fff; }

        /* Drawers & Modals */
        .archive-drawer, .context-menu { position: fixed; bottom: 0; left: 0; width: 100%; background: #141414; z-index: 2000; border-radius: 12px 12px 0 0; transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1); padding: 12px; padding-bottom: calc(30px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; max-height: 70vh; }
        .archive-drawer.open, .context-menu.open { transform: translateY(0); }
        .archive-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1999; display: none; }
        .archive-backdrop.open { display: block; }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 0 5px 12px 5px; border-bottom: 1px solid #222; margin-bottom: 10px; }
        .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 8px; overflow-y: auto; }
        .slot-btn { background: #252525; color: #ddd; padding: 10px 5px; border-radius: 8px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; border: 1px solid transparent; position: relative; }
        .slot-btn:active { background: #333; border-color: var(--primary); transform: scale(0.96); }
        .slot-icon { font-size: 18px; }
        .slot-name { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; transform: scale(0.9); }
        .slot-tag { position: absolute; top: 3px; right: 3px; font-size: 8px; color: var(--primary); opacity: 0.8; }
        
        /* Action Sheet */
        .action-item { padding: 14px; text-align: center; font-size: 14px; border-bottom: 1px solid #222; color: #ddd; }
        .action-item:last-child { border-bottom: none; }
        .action-item:active { background: #222; }
        .action-danger { color: #ff3b30; }

        /* File & Settings */
        .file-header { padding: 10px 15px; background: var(--card-bg); display: flex; gap: 10px; align-items: center; position: relative; top: 0; z-index: 20; border-bottom: 1px solid #222; }
        .breadcrumb { flex: 1; overflow-x: auto; white-space: nowrap; font-size: 12px; color: #888; }
        .file-list { padding: 5px; }
        .file-item { display: flex; align-items: center; padding: 12px 10px; margin-bottom: 4px; background: #1e1e1e; border-radius: 6px; transition: background 0.2s; }
        .file-item.selected { background: #333; border: 1px solid var(--primary); }
        .file-icon { font-size: 20px; margin-right: 12px; color: #666; }
        .file-name { font-size: 13px; color: #eee; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}
        
        .settings-container { padding: 15px; }
        .settings-card { background: #1e1e1e; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .card-title { font-size: 12px; color: #666; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; display: flex; justify-content: space-between;}
        .form-group input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 8px; }
        .btn-primary { background: var(--primary); color: #fff; border: none; padding: 10px; border-radius: 6px; width: 100%; font-size: 13px; font-weight: 600; }
        .btn-row { display: flex; gap: 10px; }
        
        .center-msg { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); color: #fff; padding: 8px 16px; border-radius: 20px; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 3000; font-size: 12px; }
        .loading-spinner { position:fixed; inset:0; display:none; align-items:center; justify-content:center; font-size:30px; color:rgba(255,255,255,0.6); z-index:50; pointer-events:none; }
        .center-icon { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 40; font-size: 50px; color: rgba(255,255,255,0.6); pointer-events: none; opacity: 0; transition: opacity 0.2s; }
        .center-icon.show { opacity: 1; }
        .app-brand-badge {
            position: fixed;
            bottom: calc(var(--nav-height) + env(safe-area-inset-bottom) + 8px);
            right: 10px;
            z-index: 900;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            color: #fff;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 999px;
            padding: 4px 9px;
            backdrop-filter: blur(6px);
            pointer-events: none;
            display: none;
        }
        @keyframes spin { 100% {transform:rotate(360deg)} }
        
        .files-topbar { position: sticky; top: env(safe-area-inset-top); z-index: 60; background: var(--bg); }
        .source-selector { display: flex; gap: 6px; padding: 8px 12px; overflow-x: auto; background: var(--bg); border-bottom: 1px solid #111; position: relative; z-index: 1; }
        .source-chip { padding: 5px 12px; background: #1a1a1a; color: #777; border-radius: 14px; font-size: 11px; white-space: nowrap; border: 1px solid #2a2a2a; }
        .source-chip.active { background: #ddd; color: #000; border-color: #ddd; font-weight: 700; }
        .account-item { background: #222; padding: 10px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .account-main { flex: 1; min-width: 0; }
        .account-name { font-size: 12px; font-weight: 700; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
        .account-url { font-size: 10px; color: #777; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
        .account-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .account-btn { border: 1px solid #3a3a3a; background: #161616; color: #ddd; border-radius: 6px; padding: 6px 10px; font-size: 11px; line-height: 1; cursor: pointer; }
        .account-btn:active { transform: scale(0.97); }
        .account-btn-edit { color: #8fb8ff; border-color: #2b63d9; }
        .account-btn-del { color: #ff8a80; border-color: #8f2b2b; }
        .account-random-tag { font-size: 9px; line-height: 1; border-radius: 999px; padding: 2px 6px; border: 1px solid transparent; }
        .account-random-on { color: #9fd6a2; border-color: #2b8a3e; background: rgba(43, 138, 62, 0.15); }
        .account-random-off { color: #f7b4b4; border-color: #a23a3a; background: rgba(162, 58, 58, 0.15); }
        .path-chip-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
        .path-chip { background:#111; border:1px solid #333; color:#bbb; border-radius:12px; font-size:11px; padding:4px 10px; }
        .picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 4000; display: none; }
        .picker-overlay.open { display: block; }
        .picker-panel { position:absolute; left:0; right:0; bottom:0; background:#141414; border-radius:12px 12px 0 0; max-height:72vh; display:flex; flex-direction:column; }
        .picker-head { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid #222; }
        .picker-list { overflow:auto; padding:8px 10px 16px; }
        .picker-row { display:flex; align-items:center; gap:8px; padding:10px; border-radius:8px; background:#1e1e1e; margin-bottom:6px; }
        .picker-row .name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:12px; }
        .picker-toolbar { display:flex; gap:8px; padding:10px; border-top:1px solid #222; }
        .search-input { width:100%; background:#111; color:#fff; border:1px solid #333; border-radius:8px; padding:8px 10px; font-size:12px; box-sizing:border-box; }
        .search-count { color:#777; font-size:11px; margin-top:6px; }
    </style>
</head>

    <script>
        let state = {
            currentTab: 'play', videoStack: [], currentIndex: -1,
            sources: [], currentSource: null, currentPath: '/', 
            useTranscode: false, quickFolders: [], dp: null, isMuted: true, playMode: 'random', isImagePaused: false,
            archivePath: 'root',
            editFolderIdx: -1, editAccountIdx: -1, // 编辑状态索引
            ctxFile: null, // 当前操作的文件
            abortController: {
                browseFile: null,
                loadNextVideo: null
            },
            uiState: {
                isLoading: false,
                lastFileListScrollTop: 0,
                browseRequestToken: 0,
                selectedPaths: [],
                pickerPath: "/",
                pickerDirs: [],
                pickerMode: 'account',
                quickFolderSelectedPath: '/',
                quickFolderSource: '',
                fileSearchQuery: '',
                pickerSearchQuery: '',
                quickFolderSearchQuery: '',
                archiveSearchQuery: ''
            },
            mediaState: {
                currentIndex: -1,
                player: null,
                hlsInstance: null,
                playRequestToken: 0,
                requestToken: 0,
                preloadInFlight: false,
                disableSeekReason: '',
                seekInFlight: false,
                lastSeekAt: 0,
                stalledRecoveryAt: 0
            }
        };
        let imageTimer = null;
        let startY=0, startTime=0, pressTimer=null, isLongPressing=false;

        function debounce(fn, wait = 120) {
            let timer = null;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), wait);
            };
        }

        function setLoading(visible) {
            state.uiState.isLoading = visible;
            document.getElementById('loading').style.display = visible ? 'flex' : 'none';
        }

        function refreshAbortController(scope) {
            if (state.abortController[scope]) state.abortController[scope].abort();
            state.abortController[scope] = new AbortController();
            return state.abortController[scope].signal;
        }

        function syncMediaState() {
            state.mediaState.currentIndex = state.currentIndex;
            state.mediaState.player = state.dp;
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // 双击检测变量
        let lastHomeClickTime = 0;

        window.onload = async () => {
            initPlayerControls(); initKeyboard(); initProgressBar(); initNavEvents();
            initActionBus(); initFileListDelegation(); initA11yButtons(); initDebouncedInteractions(); initSearchHandlers();
            updateBrandBadgeVisibility();
            await fetchSources(); await fetchFolders();
            if(state.sources.length > 0) {
                state.currentSource = state.sources[0].name;
                const initSrc = state.sources[0]; const initPath = (initSrc.selected_paths && initSrc.selected_paths.length) ? initSrc.selected_paths[0] : (initSrc.root_path || '/');
                state.currentPath = initPath; renderSourceTabs(); loadNextVideo(true); browseFile(state.currentSource, initPath);
            } else { showToast("请添加源", "info"); switchTab('settings'); }
        };

        function initSearchHandlers() {
            const onInputDebounced = debounce((targetId, stateKey, callback) => {
                const el = document.getElementById(targetId);
                if (!el) return;
                state.uiState[stateKey] = (el.value || '').trim().toLowerCase();
                callback();
            }, 120);

            const fileSearch = document.getElementById('fileSearchInput');
            if (fileSearch) {
                fileSearch.addEventListener('input', () => onInputDebounced('fileSearchInput', 'fileSearchQuery', renderFileList));
            }

            const pickerSearch = document.getElementById('pickerSearchInput');
            if (pickerSearch) {
                pickerSearch.addEventListener('input', () => onInputDebounced('pickerSearchInput', 'pickerSearchQuery', renderFolderPicker));
            }

            const quickFolderSearch = document.getElementById('quickFolderSearchInput');
            if (quickFolderSearch) {
                quickFolderSearch.addEventListener('input', () => onInputDebounced('quickFolderSearchInput', 'quickFolderSearchQuery', renderSettings));
            }

            const archiveSearch = document.getElementById('archiveSearchInput');
            if (archiveSearch) {
                archiveSearch.addEventListener('input', () => onInputDebounced('archiveSearchInput', 'archiveSearchQuery', applyArchiveSearchFilter));
            }

            const accPathInput = document.getElementById('accPath');
            if (accPathInput) {
                accPathInput.addEventListener('input', () => {
                    const manualPath = normalizePath(accPathInput.value || '/');
                    state.uiState.selectedPaths = [manualPath];
                    renderSelectedPaths();
                });
            }
        }

        function filterByKeyword(items, keyword, getText) {
            if (!keyword) return items;
            return items.filter(item => (getText(item) || '').toLowerCase().includes(keyword));
        }

        function renderSearchCount(id, matched, total, keyword) {
            const el = document.getElementById(id);
            if (!el) return;
            if (!total) {
                el.textContent = keyword ? '匹配 0 / 0' : '';
                return;
            }
            el.textContent = keyword ? `匹配 ${matched} / ${total}` : `共 ${total} 项`;
        }

        async function parseActionResponse(res) {

        function dispatchAction(action, el, event) {
            if (action === 'open-archive-root') openArchiveDrawer('root');
            else if (action === 'delete-current-media') deleteCurrentMedia();
            else if (action === 'download-media') downloadMedia();
            else if (action === 'toggle-mute') toggleMute();
            else if (action === 'toggle-landscape') toggleLandscape();
            else if (action === 'toggle-fullscreen') toggleFullScreen();
            else if (action === 'reload-sources') reloadSources();
            else if (action === 'switch-tab') switchTab(el.dataset.tab);
            else if (action === 'ctx-play') ctxPlay();
            else if (action === 'ctx-archive') ctxArchive();
            else if (action === 'ctx-rename') ctxRename();
            else if (action === 'ctx-delete') ctxDelete();
            else if (action === 'ctx-cancel') closeContextMenu();
            else if (action === 'go-up-dir') goUpDir();
            else if (action === 'mkdir-prompt') mkdirPrompt();
            else if (action === 'play-folder') playFolder();
            else if (action === 'save-folder') saveFolderItem();
            else if (action === 'cancel-edit-folder') cancelEditFolder();
            else if (action === 'save-account') saveAccountItem();
            else if (action === 'cancel-edit-account') cancelEditAccount();
            else if (action === 'close-archive-drawer') closeArchiveDrawer();
            else if (action === 'archive-back-root') openArchiveDrawer('root');
            else if (action === 'archive-handle-slot') {
                const type = el.dataset.type || 'direct';
                const path = decodeURIComponent(el.dataset.path || '');
                const name = decodeURIComponent(el.dataset.name || '');
                handleSlotClick(type, path, name);
            }
            else if (action === 'archive-move') {
                const path = decodeURIComponent(el.dataset.path || '');
                const name = decodeURIComponent(el.dataset.name || '');
                execMove(path, name);
            }
            else if (action === 'settings-account-edit') fillAccountForm(Number(el.dataset.index));
            else if (action === 'settings-account-del') delAccount(decodeURIComponent(el.dataset.name || ''));
            else if (action === 'settings-folder-edit') fillFolderForm(Number(el.dataset.index));
            else if (action === 'settings-folder-del') delQuickFolder(Number(el.dataset.index));
            else if (action === 'change-source') changeSource(decodeURIComponent(el.dataset.source || ''));
            else if (action === 'test-openlist') testOpenListConnection();
            else if (action === 'open-folder-picker') openFolderPicker();
            else if (action === 'open-quick-folder-picker') openQuickFolderPicker();
            else if (action === 'quick-folder-use-current') useCurrentPathForQuickFolder();
            else if (action === 'picker-close') closeFolderPicker();
            else if (action === 'picker-up') folderPickerGoUp();
            else if (action === 'picker-enter') folderPickerEnter(decodeURIComponent(el.dataset.path || '/'));
            else if (action === 'picker-toggle') togglePickerPath(decodeURIComponent(el.dataset.path || '/'));
            else if (action === 'picker-add-current') addCurrentPickerPath();
            else if (action === 'picker-confirm') confirmPickerSelection();
        }

                if (actionEl.dataset.stopPropagation === '1') event.stopPropagation();

            document.addEventListener('keydown', (event) => {
                const actionEl = event.target.closest('[data-action]');
                if (!actionEl) return;
                if (event.key === 'Enter' || event.key === ' ') {

            const withSlash = path.startsWith('/') ? path : `/${path}`;
            return withSlash.replace(/\/+/g, '/');

        async function loadPickerDirs(path) {

            const res = await fetch('/v1/source/dirs', {

        function folderPickerGoUp() {
            if (state.uiState.pickerPath === '/') return;

            parts.pop();
            const target = `/${parts.join('/')}` || '/';

        function togglePickerPath(path) {
            const normalizedPath = normalizePath(path);
            if (state.uiState.pickerMode === 'quick_folder') {
                state.uiState.selectedPaths = [normalizedPath];
                state.uiState.quickFolderSelectedPath = normalizedPath;
                renderFolderPicker();
                renderQuickFolderPath();
                return;
            }
            if (state.uiState.selectedPaths.includes(normalizedPath)) {
                state.uiState.selectedPaths = state.uiState.selectedPaths.filter(p => p !== normalizedPath);
            } else {
                // 添加新路径时，移除已选中的父路径（避免父路径导致扫描范围过大）
                state.uiState.selectedPaths = state.uiState.selectedPaths.filter(p => {
                    const parent = p.endsWith('/') ? p : p + '/';
                    return !normalizedPath.startsWith(parent) && p !== '/';
                });
                state.uiState.selectedPaths.push(normalizedPath);
            }
            renderFolderPicker();
            renderSelectedPaths();
        }

        function addCurrentPickerPath() {
            togglePickerPath(state.uiState.pickerPath);
        }

            if (!state.uiState.selectedPaths.length) {
                state.uiState.selectedPaths = [normalizePath(state.uiState.pickerPath)];

                const selected = normalizePath(state.uiState.selectedPaths[0]);

                state.uiState.quickFolderSelectedPath = selected;
                renderQuickFolderPath();
                closeFolderPicker();

        async function loadNextVideo(isNext = true) {
            const signal = refreshAbortController('loadNextVideo');
            const requestToken = ++state.mediaState.requestToken;
            let target = isNext ? state.currentIndex + 1 : state.currentIndex - 1;
            if(target < 0) return showToast("已经是第一个了");
            resetPlayerUI();
            setLoading(true);
            
            let media;
            if(target < state.videoStack.length) {
                media = state.videoStack[target];
                state.currentIndex = target;
            } else {
                if(state.playMode === 'folder') {
                    setLoading(false);
                    return showToast("列表播放完毕");
                }
                try {
                    const res = await fetch('/v1/get_video', { signal });
                    if(!res.ok) throw new Error();
                    if (requestToken !== state.mediaState.requestToken) return;
                    media = await res.json();
                    state.videoStack.push(media);
                    state.currentIndex = target;
                    syncMediaState();
                } catch(e) {
                    if (e.name === 'AbortError') return;
                    showToast("获取失败");
                    setLoading(false);
                    return;
                }
            }
            syncMediaState();
            renderPlayer(media);
            setTimeout(() => preloadNext(requestToken, state.currentIndex), 1500);
        }

        function resetPlayerUI() {
            clearTimeout(imageTimer); state.isImagePaused = false;
            state.mediaState.playRequestToken += 1;
            state.mediaState.seekInFlight = false;
            state.mediaState.lastSeekAt = 0;
            state.mediaState.stalledRecoveryAt = 0;
            // 1) 先停 HLS 加载和解码（必须在 video 操作之前）
            if(state.mediaState.hlsInstance) {
                try {
                    state.mediaState.hlsInstance.stopLoad();
                    state.mediaState.hlsInstance.detachMedia();
                    state.mediaState.hlsInstance.destroy();
                } catch(e) {}
                state.mediaState.hlsInstance = null;
            }
            // 2) 停止 video 元素的所有媒体活动
            if(state.dp && state.dp.video) {
                try {
                    state.dp.video.pause();
                    state.dp.video.muted = true;
                    state.dp.video.src = '';
                    state.dp.video.load();
                    state.dp.video.remove();
                } catch(e) {}
            }
            // 3) 最后销毁 Artplayer
            if(state.dp) {
                try { state.dp.destroy(); } catch(e) {}
                state.dp = null;
            }
            syncMediaState();
            document.getElementById('player').innerHTML = ''; document.getElementById('player').style.display = 'none';
            document.getElementById('image-viewer').style.display = 'none';
            document.getElementById('progressCurrent').style.width = '0%';
            document.getElementById('playIcon').classList.remove('show');
        }

        Artplayer.RECONNECT_TIME_MAX = 5;
        Artplayer.RECONNECT_SLEEP_TIME = 2000;

        function renderPlayer(media, options = {}) {
            const forceDirect = options.forceDirect === true;
            const attempt = Number.isFinite(options.attempt) ? options.attempt : 0;
            const playerDiv = document.getElementById('player');
            const imgDiv = document.getElementById('image-viewer');
            if(media.type === 'image') {
                state.mediaState.disableSeekReason = '当前为图片';
                imgDiv.style.backgroundImage = `url('${media.url}')`;
                imgDiv.style.display = 'block';
                setLoading(false);
                startImageTimer();
            } else {
                playerDiv.style.display = 'block';
                let url = (state.useTranscode && !forceDirect) ? media.transcode_url : media.url;
                state.mediaState.disableSeekReason = (url === media.transcode_url) ? '转码流暂不支持拖动定位，请关闭转码后重试' : '';
                if(!state.useTranscode && media.recommend_transcode) showToast("可开启转码优化播放");
                const playToken = ++state.mediaState.playRequestToken;
                let playbackStarted = false;
                let recovered = false;

                // 仅在视频尚未开始播放时才触发恢复（参考 LibreTV 架构）
                const recoverPlayback = (reason) => {
                    if (recovered) return;
                    if (playToken !== state.mediaState.playRequestToken) return;
                    if (playbackStarted) {
                        // 已经开始播放后的错误只记录，不重建播放器
                        console.warn('播放中临时错误(已忽略):', reason);
                        return;
                    }
                    recovered = true;

                    if ((state.useTranscode && !forceDirect) && media.url) {
                        showToast("转码流加载异常，自动切换原始流");
                        resetPlayerUI();
                        renderPlayer(media, { forceDirect: true, attempt: attempt + 1 });
                        return;
                    }

                    if (attempt < 1) {
                        showToast("加载异常，自动重试");
                        resetPlayerUI();
                        renderPlayer(media, { forceDirect, attempt: attempt + 1 });
                        return;
                    }

                    console.warn('加载失败，自动切换下一条:', reason);
                    showToast("当前资源加载失败，自动下一条");
                    loadNextVideo(true);
                };

                const isHls = /\.m3u8(\?|$)/i.test(url);
                state.dp = new Artplayer({
                    container: playerDiv,
                    url: url,
                    autoplay: true,
                    loop: false,
                    muted: state.isMuted,
                    poster: media.img_url,
                    setting: true,
                    volume: 0.7,
                    fullscreenWeb: true,
                    airplay: true,
                    pip: true,
                    playsInline: true,
                    type: isHls ? 'm3u8' : 'mp4',
                    customType: {
                        m3u8: function (video, playUrl) {
                            if (Hls.isSupported()) {
                                if (video._hls) {
                                    try { video._hls.stopLoad(); video._hls.detachMedia(); video._hls.destroy(); } catch(e) {}
                                }
                                const hls = new Hls({
                                    fragLoadingMaxRetry: 6,
                                    fragLoadingRetryDelay: 1000,
                                    manifestLoadingMaxRetry: 3,
                                    levelLoadingMaxRetry: 4,
                                    appendErrorMaxRetry: 5,
                                    enableWorker: true,
                                    lowLatencyMode: false,
                                    nudgeOffset: 0.1,
                                    nudgeMaxRetry: 6,
                                    highBufferWatchdogPeriod: 2,
                                    backBufferLength: 30,
                                    maxBufferLength: 24,
                                    maxBufferHole: 0.1
                                });
                                hls.loadSource(playUrl);
                                hls.attachMedia(video);
                                video._hls = hls;
                                state.mediaState.hlsInstance = hls;

                                let hlsFatalCount = 0;
                                hls.on(Hls.Events.ERROR, function (event, data) {
                                    if (!data.fatal) return;
                                    hlsFatalCount++;
                                    if (playbackStarted) {
                                        // 已开始播放后：只做内部恢复，不重建播放器
                                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
                                        else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
                                        return;
                                    }
                                    // 未开始播放：尝试恢复，超过上限则放弃
                                    if (hlsFatalCount > 3) {
                                        recoverPlayback('hls-fatal-' + data.type);
                                        return;
                                    }
                                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                        console.warn('HLS网络错误，尝试恢复');
                                        hls.startLoad();
                                    } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                                        console.warn('HLS媒体错误，尝试恢复');
                                        hls.recoverMediaError();
                                    } else {
                                        recoverPlayback('hls-fatal-other');
                                    }
                                });
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = playUrl;
                                state.mediaState.hlsInstance = null;
                            }
                        }
                    }
                });
                syncMediaState();
                state.dp.toggle = () => {
                    if (!state.dp || !state.dp.video) return;
                    if (state.dp.video.paused) state.dp.play();
                    else state.dp.pause();
                };
                state.dp.speed = (rate) => { if (state.dp && state.dp.video) state.dp.video.playbackRate = rate; };
                state.dp.seek = (time) => { if (state.dp && state.dp.video) state.dp.video.currentTime = time; };

                if(state.dp.video) {
                    state.dp.video.muted = state.isMuted;
                    state.dp.video.playsInline = true;
                    state.dp.video.setAttribute('playsinline', 'true');
                    state.dp.video.setAttribute('webkit-playsinline', 'true');
                    state.dp.video.setAttribute('x5-playsinline', 'true');
                    state.dp.video.setAttribute('autoplay', 'autoplay');
                    state.dp.video.preload = 'metadata';

                    let stallTimer = null;
                    const clearStallTimer = () => {
                        if (stallTimer) {
                            clearTimeout(stallTimer);
                            stallTimer = null;
                        }
                    };

                    const trySoftRecover = (reason) => {
                        if (!state.dp || !state.dp.video) return;
                        const now = Date.now();
                        if (now - state.mediaState.stalledRecoveryAt < 1800) return;
                        state.mediaState.stalledRecoveryAt = now;
                        const v = state.dp.video;
                        console.warn('尝试恢复卡顿:', reason);
                        if (state.mediaState.hlsInstance) {
                            try { state.mediaState.hlsInstance.startLoad(v.currentTime || -1); } catch (_) {}
                            try { state.mediaState.hlsInstance.recoverMediaError(); } catch (_) {}
                        } else {
                            try {
                                const maxSeek = Number.isFinite(v.duration) ? Math.max(0, v.duration - 0.05) : null;
                                const target = Math.max(0, v.currentTime + 0.01);
                                v.currentTime = maxSeek === null ? target : Math.min(target, maxSeek);
                            } catch (_) {}
                        }
                        Promise.resolve(v.play()).catch(() => {});
                    };

                    const scheduleSoftRecover = (reason) => {
                        if (!state.dp || !state.dp.video) return;
                        if (state.dp.video.paused || state.dp.video.ended) return;
                        clearStallTimer();
                        stallTimer = setTimeout(() => {
                            if (!state.dp || !state.dp.video) return;
                            if (state.dp.video.paused || state.dp.video.ended) return;
                            if (state.mediaState.seekInFlight) return;
                            if (state.dp.video.readyState >= 3) return;
                            trySoftRecover(reason);
                        }, 1200);
                    };

                    // 进度条更新
                    state.dp.video.addEventListener('timeupdate', () => {
                        clearStallTimer();
                        if(state.dp && state.dp.video && state.dp.video.duration) {
                            document.getElementById('progressCurrent').style.width = (state.dp.video.currentTime / state.dp.video.duration) * 100 + '%';
                        }
                    });

                    // 视频可播放 → 标记 playbackStarted，取消加载状态
                    state.dp.video.addEventListener('canplay', () => {
                        clearStallTimer();
                        if (playToken !== state.mediaState.playRequestToken) return;
                        playbackStarted = true;
                        setLoading(false);
                        state.dp.play().catch(() => {
                            state.dp.video.muted = true;
                            state.dp.play().catch(() => {});
                        });
                    }, { once: true });

                    // playing 事件也标记（双保险，有些浏览器 canplay 不可靠）
                    state.dp.video.addEventListener('playing', () => {
                        clearStallTimer();
                        playbackStarted = true;
                        setLoading(false);
                    }, { once: true });

                    state.dp.video.addEventListener('seeking', () => {
                        state.mediaState.seekInFlight = true;
                        setLoading(true);
                    });
                    state.dp.video.addEventListener('seeked', () => {
                        state.mediaState.seekInFlight = false;
                        setLoading(false);
                    });
                    state.dp.video.addEventListener('waiting', () => {
                        scheduleSoftRecover('waiting');
                    });
                    state.dp.video.addEventListener('stalled', () => {
                        scheduleSoftRecover('stalled');
                    });
                    state.dp.video.addEventListener('pause', clearStallTimer);

                    // 视频播完 → 手动循环（替代 loop:true，避免 302 redirect 问题）
                    state.dp.video.addEventListener('ended', () => {
                        clearStallTimer();
                        if (playToken !== state.mediaState.playRequestToken) return;
                        if (state.dp && state.dp.video) {
                            state.dp.video.currentTime = 0;
                            state.dp.play().catch(() => {});
                        }
                    });

                    // video error → 仅在未开始播放时触发恢复
                    state.dp.video.addEventListener('error', () => {
                        if (playbackStarted) {
                            console.warn('播放中 video error (已忽略)');
                            return;
                        }
                        const mediaError = state.dp && state.dp.video ? state.dp.video.error : null;
                        recoverPlayback(mediaError ? `video-error-${mediaError.code}` : 'video-error');
                    });

                    // Artplayer 内置重连耗尽 → 仅在未开始播放时触发恢复
                    state.dp.on('error', (error, reconnectTime) => {
                        console.warn('Artplayer重连:', reconnectTime);
                        if (!playbackStarted && reconnectTime >= Artplayer.RECONNECT_TIME_MAX) {
                            recoverPlayback('artplayer-reconnect-exhausted');
                        }
                    });

                    // 加载超时提示（不触发重建，只提示用户）
                    setTimeout(() => {
                        if (playToken === state.mediaState.playRequestToken && !playbackStarted && !recovered) {
                            showToast("加载较慢，请耐心等待...");
                        }
                    }, 10000);
                }
            }
        }

            const current = state.videoStack[state.currentIndex];
            if(!current) return;
            if(!confirm(`确定删除？`)) return;
            resetPlayerUI();
            await new Promise(r => setTimeout(r, 500));
            try {
                const res = await fetch('/v1/delete_video', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({source: current.source, path: current.raw_path})
                });
                const { ok, body } = await parseActionResponse(res);
                if(ok) {
                    showToast("已删除");
                    state.videoStack.splice(state.currentIndex, 1);
                    state.currentIndex--;
                    loadNextVideo(true);
                } else {
                    showToast(`删除失败: ${body.detail || body.message || '未知错误'}`);
                }
            } catch(e) {
                showToast("网络错误");
            }
        }
        function startImageTimer() { clearTimeout(imageTimer); imageTimer = setTimeout(() => { if(!state.isImagePaused) loadNextVideo(true); }, 5000); }
        async function preloadNext(expectedRequestToken, expectedIndex) {
            if (state.playMode !== 'random') return;
            if (expectedRequestToken !== state.mediaState.requestToken) return;
            if (expectedIndex !== state.currentIndex) return;
            if (state.mediaState.preloadInFlight) return;
            state.mediaState.preloadInFlight = true;
            try {
                const res = await fetch('/v1/get_video');
                if (!res.ok) return;
                const next = await res.json();
                if (expectedRequestToken !== state.mediaState.requestToken) return;
                if (expectedIndex !== state.currentIndex) return;
                state.videoStack.push(next);
                fetch((state.useTranscode ? next.transcode_url : next.url), { headers: { 'Range': 'bytes=0-1024000' } }).catch(() => {});
            } catch (e) {
            } finally {
                state.mediaState.preloadInFlight = false;
            }
        }
        function initPlayerControls() { const layer = document.getElementById('click-layer'); layer.addEventListener('touchstart', e => { startY = e.touches[0].clientY; startTime = Date.now(); state.isLongPressing = false; pressTimer = setTimeout(() => { if(state.dp && state.dp.video && !state.dp.video.paused) { state.dp.speed(3); showToast("3倍速"); state.isLongPressing = true; } }, 500); }); layer.addEventListener('touchmove', e => { if(Math.abs(e.touches[0].clientY - startY) > 10) clearTimeout(pressTimer); }); layer.addEventListener('touchend', e => { clearTimeout(pressTimer); if(state.isLongPressing) { if(state.dp) state.dp.speed(1); state.isLongPressing = false; return; } const diff = startY - e.changedTouches[0].clientY; if(Date.now() - startTime < 300 && Math.abs(diff) > 50) { if(diff > 0) loadNextVideo(true); else loadNextVideo(false); } else if (Date.now() - startTime < 300 && Math.abs(diff) < 10) { const current = state.videoStack[state.currentIndex]; if(current && current.type === 'image') { state.isImagePaused = !state.isImagePaused; if(state.isImagePaused) clearTimeout(imageTimer); else startImageTimer(); } else if(state.dp) state.dp.toggle(); } }); }
        function initKeyboard() { window.addEventListener('keydown', e => { if(state.currentTab!=='play')return; if(["Space","ArrowUp","ArrowDown"].includes(e.code)) e.preventDefault(); switch(e.code) { case 'Space': if(state.dp) state.dp.toggle(); break; case 'ArrowUp': loadNextVideo(false); break; case 'ArrowDown': loadNextVideo(true); break; } }); }
        function initProgressBar() {
            const bar = document.getElementById('progressBar');
            const cur = document.getElementById('progressCurrent');
            let dragging = false;
            let activePointerId = null;
            let pendingProgress = null;
            let lastWarnAt = 0;

            const warnOnce = (message) => {
                if (Date.now() - lastWarnAt > 1000) {
                    showToast(message);
                    lastWarnAt = Date.now();
                }
            };

            const canSeekNow = () => {
                if (!state.dp || !state.dp.video) return false;
                if (state.mediaState.disableSeekReason) {
                    warnOnce(state.mediaState.disableSeekReason);
                    return false;
                }
                const duration = state.dp.video.duration;
                if (!Number.isFinite(duration) || duration <= 0) {
                    warnOnce('视频还在加载元数据，请稍后拖动');
                    return false;
                }
                return true;
            };

            const progressFromClientX = (clientX) => {
                const rect = bar.getBoundingClientRect();
                if (!rect.width) return 0;
                return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
            };

            const previewAt = (clientX) => {
                const progress = progressFromClientX(clientX);
                pendingProgress = progress;
                cur.style.width = `${progress * 100}%`;
            };

            const commitPendingSeek = () => {
                if (pendingProgress === null) return;
                if (!canSeekNow()) {
                    pendingProgress = null;
                    return;
                }
                if (state.mediaState.seekInFlight) {
                    pendingProgress = null;
                    return;
                }
                const video = state.dp && state.dp.video;
                if (!video) {
                    pendingProgress = null;
                    return;
                }
                const duration = state.dp.video.duration;
                const maxSeek = Math.max(0, duration - 0.05);
                const target = Math.min(maxSeek, Math.max(0, duration * pendingProgress));
                const resumeAfterSeek = !video.paused;
                pendingProgress = null;

                state.mediaState.seekInFlight = true;
                state.mediaState.lastSeekAt = Date.now();
                setLoading(true);

                let settled = false;
                let seekTimer = null;
                let seekedHandler = null;
                let playingHandler = null;
                let errorHandler = null;
                let canplayHandler = null;

                const clearSeekHandlers = () => {
                    if (seekTimer) clearTimeout(seekTimer);
                    if (seekedHandler) video.removeEventListener('seeked', seekedHandler);
                    if (playingHandler) video.removeEventListener('playing', playingHandler);
                    if (errorHandler) video.removeEventListener('error', errorHandler);
                    if (canplayHandler) video.removeEventListener('canplay', canplayHandler);
                    seekTimer = null;
                    seekedHandler = null;
                    playingHandler = null;
                    errorHandler = null;
                    canplayHandler = null;
                };

                const finishSeek = (ok) => {
                    if (settled) return;
                    settled = true;
                    clearSeekHandlers();
                    state.mediaState.seekInFlight = false;
                    setLoading(false);
                    if (!ok) {
                        warnOnce('定位较慢，已自动尝试恢复');
                        if (state.mediaState.hlsInstance) {
                            try { state.mediaState.hlsInstance.startLoad(target); } catch (_) {}
                            try { state.mediaState.hlsInstance.recoverMediaError(); } catch (_) {}
                        }
                    }
                    if (resumeAfterSeek) Promise.resolve(video.play()).catch(() => {});
                };

                seekedHandler = () => finishSeek(true);
                playingHandler = () => finishSeek(true);
                canplayHandler = () => {
                    if (Math.abs(video.currentTime - target) <= 1) finishSeek(true);
                };
                errorHandler = () => finishSeek(false);

                video.addEventListener('seeked', seekedHandler, { once: true });
                video.addEventListener('playing', playingHandler, { once: true });
                video.addEventListener('canplay', canplayHandler, { once: true });
                video.addEventListener('error', errorHandler, { once: true });

                seekTimer = setTimeout(() => finishSeek(false), 2600);
                try {
                    video.currentTime = target;
                } catch (_) {
                    finishSeek(false);
                }
            };

            const beginDrag = (clientX, pointerId = null) => {
                if (!canSeekNow()) return;
                dragging = true;
                activePointerId = pointerId;
                previewAt(clientX);
            };

            const endDrag = (clientX = null) => {
                if (!dragging) return;
                if (typeof clientX === 'number') previewAt(clientX);
                dragging = false;
                activePointerId = null;
                commitPendingSeek();
            };

            bar.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (dragging) return;
                previewAt(e.clientX);
                commitPendingSeek();
            });

            const supportsPointer = typeof window.PointerEvent !== 'undefined';
            if (supportsPointer) {
                bar.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    beginDrag(e.clientX, e.pointerId);
                    if (!dragging) return;
                    if (bar.setPointerCapture) {
                        try { bar.setPointerCapture(e.pointerId); } catch (_) {}
                    }
                }, { passive: false });

                window.addEventListener('pointermove', (e) => {
                    if (!dragging) return;
                    if (activePointerId !== null && e.pointerId !== activePointerId) return;
                    e.preventDefault();
                    previewAt(e.clientX);
                }, { passive: false });

                const endPointerDrag = (e) => {
                    if (activePointerId !== null && e && e.pointerId !== undefined && e.pointerId !== activePointerId) return;
                    if (bar.releasePointerCapture && activePointerId !== null) {
                        try { bar.releasePointerCapture(activePointerId); } catch (_) {}
                    }
                    endDrag(e && typeof e.clientX === 'number' ? e.clientX : null);
                };
                window.addEventListener('pointerup', endPointerDrag);
                window.addEventListener('pointercancel', endPointerDrag);
                return;
            }

            // Mouse/touch fallback for browsers without pointer events
            bar.addEventListener('mousedown', (e) => {
                e.preventDefault();
                beginDrag(e.clientX);
            });
            window.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                previewAt(e.clientX);
            });
            window.addEventListener('mouseup', (e) => {
                endDrag(e.clientX);
            });

            bar.addEventListener('touchstart', (e) => {
                if (!e.touches || !e.touches[0]) return;
                e.preventDefault();
                e.stopPropagation();
                beginDrag(e.touches[0].clientX);
            }, { passive: false });
            bar.addEventListener('touchmove', (e) => {
                if (!dragging || !e.touches || !e.touches[0]) return;
                e.preventDefault();
                previewAt(e.touches[0].clientX);
            }, { passive: false });
            bar.addEventListener('touchend', () => {
                endDrag();
            }, { passive: true });
            bar.addEventListener('touchcancel', () => {
                endDrag();
            }, { passive: true });
        }
        function renderSourceTabs() { document.getElementById('sourceTabs').innerHTML = state.sources.map(s => `<div class="source-chip ${s.name === state.currentSource ? 'active' : ''}" data-action="change-source" data-source="${encodeURIComponent(s.name || '')}">${escapeHtml(s.name || '')}</div>`).join(''); initA11yButtons(); }
        function changeSource(name) { state.currentSource = name; const src = state.sources.find(s => s.name === name); const startPath = (src && src.selected_paths && src.selected_paths.length) ? src.selected_paths[0] : (src && src.root_path ? src.root_path : '/'); state.currentPath = startPath; renderSourceTabs(); browseFile(name, startPath); }
        function onFileClick(path, isDir) { if(isDir) { state.currentPath = path; browseFile(state.currentSource, path); } else { if (state.abortController.browseFile) state.abortController.browseFile.abort(); if (state.abortController.loadNextVideo) state.abortController.loadNextVideo.abort(); resetPlayerUI(); const media = { url: `/v1/stream?source=${state.currentSource}&path=${encodeURIComponent(path)}`, transcode_url: `/v1/transcode?source=${state.currentSource}&path=${encodeURIComponent(path)}`, download_url: `/v1/download?source=${state.currentSource}&path=${encodeURIComponent(path)}`, source: state.currentSource, raw_path: path, type: 'video' }; state.videoStack.splice(state.currentIndex + 1, 0, media); state.currentIndex++; state.playMode = 'random'; syncMediaState(); switchTab('play'); renderPlayer(media); } }
        function goUpDir() { if(state.currentPath === '/') return; const p = state.currentPath.split('/'); p.pop(); state.currentPath = p.length === 1 ? '/' : p.join('/'); browseFile(state.currentSource, state.currentPath); }
        function playFolder() { if(!state.currentFileList) return; const videos = state.currentFileList.filter(f => !f.is_dir).map(f => ({ url: `/v1/stream?source=${state.currentSource}&path=${encodeURIComponent(f.path)}`, transcode_url: `/v1/transcode?source=${state.currentSource}&path=${encodeURIComponent(f.path)}`, download_url: `/v1/download?source=${state.currentSource}&path=${encodeURIComponent(f.path)}`, source: state.currentSource, raw_path: f.path, type: 'video', name: f.name })); if(videos.length === 0) return showToast("无视频"); resetPlayerUI(); state.playMode = 'folder'; state.videoStack = videos; state.currentIndex = 0; switchTab('play'); renderPlayer(videos[0]); showToast(`播放 ${videos.length} 个视频`); }
        let _toastTimer = null;
        function showToast(msg, type="info") { const t = document.getElementById('toast'); t.textContent = msg; t.style.opacity = 1; if(_toastTimer) clearTimeout(_toastTimer); _toastTimer = setTimeout(() => { t.style.opacity = 0; _toastTimer = null; }, 2000); }
    </script>
</body>
